name: Release

on:
  release:
    types: [published]  # срабатывает когда создаёшь Release на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          rm -rf dist/
          pip install build hatchling
          python -m build
          unzip -p dist/aethernet_core-1.0.1-py3-none-any.whl "*.dist-info/METADATA" | head -5

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dists
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment: pypi          # привязка к GitHub Environment
    permissions:
      id-token: write          # обязательно для OIDC

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/

      - name: Check dist contents  # временно, для диагностики
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@fb13cb306901256ace3dab689990e13a5550ffaa  # v1.11.0