name: Release

on:
  release:
    types: [published]  # срабатывает когда создаёшь Release на GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          pip install build
          python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dists
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi               # привязка к GitHub Environment
      url: https://pypi.org/p/aethernet-core
    permissions:
      id-token: write          # обязательно для OIDC

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1